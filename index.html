<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>⚡ NEO-OS 2077 | Cyberpunk Desktop Environment</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="screensaverCanvas" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:99999; background:#000;"></canvas>

<div id="bootScreen" class="fullscreen-overlay">
  <div class="boot-animation">
    <div class="boot-logo">⚡ NEO-OS 2077</div>
    <div class="loader-bar"><div class="loader-fill"></div></div>
    <div style="margin-top:12px; font-family:monospace; color:var(--neon);">initializing neural core...</div>
  </div>
</div>

<div id="loginScreen" class="fullscreen-overlay" style="display: none;">
  <div class="login-container">
    <h2>🔐 CYBER-LOGIN</h2>
    <input type="text" id="loginUser" placeholder="username" value="neon_user">
    <input type="password" id="loginPass" placeholder="password" value="2077">
    <button id="loginBtn">⛓️ ACCESS GRID ⛓️</button>
  </div>
</div>

<div id="desktopEnv" class="desktop" style="display: none;">
  <canvas id="cyber-bg"></canvas>
  
  <div class="desktop-icons" id="desktopIconsContainer"></div>

  <div class="taskbar">
    <div class="start-btn" id="startBtn">🌀 START</div>
    <div class="taskbar-windows" id="taskbarList"></div>
    
    <div class="taskbar-right">
      <button id="micBtn" class="taskbar-icon-btn" title="Voice Commands">🎙️</button>
      <button id="notifBellBtn" class="taskbar-icon-btn" title="Notification History">🔔<span id="notifBadge" class="badge" style="display:none;">0</span></button>
      <div class="clock" id="liveClock">--:--:--</div>
    </div>
  </div>

  <div class="start-menu" id="startMenu">
    <div class="start-item" data-app="terminal">📟 Terminal</div>
    <div class="start-item" data-app="notes">📝 Notes App</div>
    <div class="start-item" data-app="calculator">🔢 Calculator</div>
    <div class="start-item" data-app="explorer">🗂️ File Explorer</div>
    <div class="start-item" data-app="music">🎧 Music Player</div>
    <div class="start-item" data-app="settings">⚙️ System Settings</div>
    <div class="start-item" data-app="taskmanager">📊 Task Manager</div>
    <hr style="border:1px solid rgba(0,255,255,0.2); margin:4px 0;">
    <div class="start-item" id="themeSwitchEaster">🎨 Quick Glow Toggle</div>
  </div>

  <div class="notif-center" id="notifCenter">
    <div class="notif-center-header">
      <span>Notifications History</span>
      <button id="clearNotifsBtn">Clear</button>
    </div>
    <div class="dnd-toggle-container">
      <label><input type="checkbox" id="dndCheckbox"> Do Not Disturb (DND)</label>
    </div>
    <div class="notif-center-list" id="notifCenterList">
      <div style="padding:10px; text-align:center; opacity:0.5;">No notifications</div>
    </div>
  </div>

  <div class="notif-area" id="notifications"></div>
</div>

<script src="script.js"></script>
</body>
</html>
